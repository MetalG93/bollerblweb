<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security5">
<img th:src="@{img\header.jpg}" alt="Header" />

<nav class="navbar navbar-expand-lg navbar-light">
  <a class="navbar-brand" href="/">
    <img src="./img/logo.jpg" alt="Icon"/>
  </a>
  <button class="navbar-toggler" type="button" data-toggle="collapse"
          data-target="#navbarNavDropdown" aria-controls="navbarNavDropdown"
          aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNavDropdown">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item active"><a class="nav-link text-white"
                                     href="/home">Home <span class="sr-only">(current)</span></a></li>
      <li class="nav-item"><a class="nav-link text-white"
                              href="/media">Media</a></li>
      <li class="nav-item" sec:authorize="hasAuthority('ADMIN')"><a class="nav-link text-white" href="/adminPage">Admin page</a></li>
    </ul>

    <form th:action="@{/logout}" method="post">
      <input type="submit" class="btn btn-outline-light my-2 my-sm-0"/>
    </form>
  </div>
</nav>
</body>
</html>
